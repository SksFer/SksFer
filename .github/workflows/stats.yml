name: Generate GitHub Cards

on:
  schedule:
    - cron: "0 0 * * *" # Se ejecuta automáticamente cada noche
  workflow_dispatch: # Te permite activarlo manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Stats Cards
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SksFer
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Santiago
